name: Update Markets Ticker

on:
  schedule:
    # Every hour during UK market hours (07:00-17:00 UTC, Mon-Fri)
    - cron: '7 7-17 * * 1-5'
    # Every 4 hours outside market hours and weekends (for oil, gold, BTC which trade 24/7)
    - cron: '37 1,5,21 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch market data and update embedded-markets
        run: |
          # Fetch from Yahoo Finance v8 chart API
          declare -A SYMBOLS=(
            [FTSE]="%5EFTSE"
            [SP]="%5EGSPC"
            [Brent]="BZ%3DF"
            [GBP]="GBPUSD%3DX"
            [Gold]="GC%3DF"
            [EURGBP]="EURGBP%3DX"
            [VIX]="%5EVIX"
            [BTC]="BTC-USD"
            [UST]="%5ETNX"
          )

          JSON="{"
          ANY_SUCCESS=false

          for ID in FTSE SP Brent GBP Gold EURGBP VIX BTC UST; do
            SYM="${SYMBOLS[$ID]}"
            DATA=$(curl -sf --max-time 10 "https://query2.finance.yahoo.com/v8/finance/chart/${SYM}?range=2d&interval=1d" 2>/dev/null)
            if [ $? -ne 0 ] || [ -z "$DATA" ]; then
              DATA=$(curl -sf --max-time 10 "https://query1.finance.yahoo.com/v8/finance/chart/${SYM}?range=2d&interval=1d" 2>/dev/null)
            fi

            if [ -n "$DATA" ]; then
              PRICE=$(echo "$DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['chart']['result'][0]['meta']['regularMarketPrice'])" 2>/dev/null)
              PREV=$(echo "$DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); m=d['chart']['result'][0]['meta']; print(m.get('chartPreviousClose', m.get('previousClose', 0)))" 2>/dev/null)

              if [ -n "$PRICE" ] && [ -n "$PREV" ] && [ "$PREV" != "0" ]; then
                CHANGE=$(python3 -c "print(round(($PRICE - $PREV) / $PREV * 100, 2))")
                JSON="${JSON}\"${ID}\":{\"price\":${PRICE},\"change\":${CHANGE}},"
                ANY_SUCCESS=true
              fi
            fi
          done

          if [ "$ANY_SUCCESS" = false ]; then
            echo "No market data fetched — skipping update"
            exit 0
          fi

          # Add Gilt (no Yahoo ticker — keep existing value or use 0)
          EXISTING_GILT=$(python3 -c "
          import json, re
          with open('index.html') as f:
            content = f.read()
          m = re.search(r'id=\"embedded-markets\"[^>]*>({.*?})</script>', content)
          if m:
            data = json.loads(m.group(1))
            gilt = data.get('Gilt', {'price': 4.95, 'change': 0})
            print(json.dumps(gilt))
          else:
            print('{\"price\":4.95,\"change\":0}')
          " 2>/dev/null || echo '{"price":4.95,"change":0}')

          # Build timestamp in ISO format with UK offset
          TS=$(TZ="Europe/London" date +"%Y-%m-%dT%H:%M:%S%:z")

          JSON="${JSON}\"Gilt\":${EXISTING_GILT},\"ts\":\"${TS}\"}"

          echo "Market data: $JSON"

          # Replace embedded-markets in index.html
          python3 -c "
          import re, sys
          json_data = sys.argv[1]
          with open('index.html', 'r') as f:
            content = f.read()
          pattern = r'(<script id=\"embedded-markets\" type=\"application/json\">).*?(</script>)'
          replacement = r'\g<1>' + json_data + r'\g<2>'
          new_content = re.sub(pattern, replacement, content, count=1)
          with open('index.html', 'w') as f:
            f.write(new_content)
          print('Updated embedded-markets')
          " "$JSON"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to origin
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Market Ticker Bot"
          git config user.email "noreply@thedailybrief.co.uk"
          git add index.html
          git commit -m "chore: Auto-update markets ticker"
          git push

      - name: Push to org repo (live site)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git remote add org https://x-access-token:${{ secrets.ORG_DEPLOY_TOKEN }}@github.com/thedailybrief-uk/thedailybrief-uk.github.io.git 2>/dev/null || true
          git push org main 2>/dev/null || echo "⚠ Could not push to org repo — set ORG_DEPLOY_TOKEN secret"
