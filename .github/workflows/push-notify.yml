name: Push Notifications

on:
  push:
    branches: [main]
    paths: [index.html]
  workflow_dispatch:
    inputs:
      message:
        description: 'Notification message'
        required: true
      type:
        description: 'Notification type (edition or breaking)'
        required: false
        default: 'edition'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-push
        run: npm install web-push

      - name: Detect notification type and send (with deduplication)
        env:
          PUSH_AUTH_TOKEN: ${{ secrets.PUSH_AUTH_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: "BJ8KRLYBThmYGP1dcFNbMpWRJSTnZfe0nWu7cQKxxwK8-wESiXKk6OfJhYI28MykLxj5xSzggp8whn_DYaEWAKw"
          VAPID_SUBJECT: "mailto:ed@thedailybrief.co.uk"
          PUSH_WORKER_URL: "https://daily-brief-push.thedailybrief.workers.dev"
        run: |
          # Manual dispatch — always send, no dedup needed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch"
            node scripts/push-notify.js "${{ github.event.inputs.message }}" --type "${{ github.event.inputs.type }}" --no-verify
            exit 0
          fi

          # Only check the LATEST commit message (not all commits in push)
          # This prevents fix/chore commits from triggering notifications
          LATEST_MSG=$(git log -1 --pretty=%B)

          # STRICT commit message matching — only feat: commits trigger notifications
          # This prevents fix:, chore:, and other commits from sending duplicates
          if ! echo "$LATEST_MSG" | grep -q '^feat:'; then
            echo "Not a feat: commit — skipping notification"
            exit 0
          fi

          DIFF=$(git diff HEAD~1 HEAD -- index.html)

          # --- BREAKING NEWS ---
          # Only trigger if the breaking-stories JSON block was actually modified
          # AND the commit message contains "Breaking banner"
          if echo "$LATEST_MSG" | grep -qiE 'breaking banner|breaking news'; then
            if echo "$DIFF" | grep '^+' | grep -q '"headline"'; then
              echo "Detected: Breaking news update"
              HEADLINE=$(echo "$DIFF" | grep '^+' | grep -oP '"headline"\s*:\s*"\K[^"]+' | head -1)
              if [ -z "$HEADLINE" ]; then
                HEADLINE="Breaking news on The Daily Brief"
              fi
              # Clean the headline — remove timestamp suffix (e.g. "— 13:06 GMT")
              HEADLINE=$(echo "$HEADLINE" | sed 's/ — [0-9][0-9]:[0-9][0-9] GMT$//')
              node scripts/push-notify.js "$HEADLINE" --type breaking
              exit 0
            fi
          fi

          # --- MORNING BRIEFING ---
          # Only trigger on feat: commits with "Morning briefing" in the message
          if echo "$LATEST_MSG" | grep -qiE '^feat:.*morning briefing'; then
            echo "Detected: Morning briefing"
            node scripts/push-notify.js "The Morning Briefing is live" --type edition
            exit 0
          fi

          # --- EVENING BRIEFING ---
          if echo "$LATEST_MSG" | grep -qiE '^feat:.*evening briefing'; then
            echo "Detected: Evening briefing"
            node scripts/push-notify.js "The Evening Briefing is live" --type edition
            exit 0
          fi

          echo "No notification trigger detected — skipping"
